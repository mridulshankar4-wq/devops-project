apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertpulse-backend
  labels:
    app: alertpulse
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: alertpulse
      tier: backend
  template:
    metadata:
      labels:
        app: alertpulse
        tier: backend
    spec:
      containers:
        - name: backend
          image: alertpulse-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: alertpulse-config
                  key: database_url
            - name: DEMO_ENABLED
              value: "true"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertpulse-frontend
  labels:
    app: alertpulse
    tier: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertpulse
      tier: frontend
  template:
    metadata:
      labels:
        app: alertpulse
        tier: frontend
    spec:
      containers:
        - name: frontend
          image: alertpulse-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
