name: AlertPulse CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Stage 1: Code Quality ─────────────────────────────
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install linting tools
        run: pip install flake8 black isort

      - name: Run flake8 linter
        run: flake8 backend/app --max-line-length=120 --ignore=E501,W503

      - name: Set up Node.js 20
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install frontend deps
        run: cd frontend && npm install

      - name: Run ESLint
        run: cd frontend && npx eslint src --ext .js,.jsx --max-warnings 10 || true

  # ── Stage 2: Build ────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build backend image
        run: |
          docker build -t alertpulse-backend:${{ github.sha }} ./backend
          docker tag alertpulse-backend:${{ github.sha }} alertpulse-backend:latest

      - name: Build frontend image
        run: |
          docker build -t alertpulse-frontend:${{ github.sha }} ./frontend
          docker tag alertpulse-frontend:${{ github.sha }} alertpulse-frontend:latest

      - name: Verify images exist
        run: docker images | grep alertpulse

  # ── Stage 3: Test ─────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Start full stack
        run: docker compose up -d
        
      - name: Wait for backend to be ready
        run: |
          for i in {1..30}; do
            curl -sf http://localhost:8000/health && break
            echo "Waiting... ($i)"
            sleep 2
          done

      - name: Wait for frontend to be ready
        run: |
          for i in {1..30}; do
            curl -sf http://localhost:3000 && break
            sleep 2
          done

      - name: Install Puppeteer
        run: cd puppeteer && npm install

      - name: Run smoke tests
        run: cd puppeteer && npm run smoke-test

      - name: Run load test
        run: cd puppeteer && BATCHES=2 BATCH_SIZE=10 npm run load-test

      - name: Stop stack
        run: docker compose down

  # ── Stage 4: Security Scan ────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Build backend for scanning
        run: docker build -t alertpulse-backend:scan ./backend

      - name: Scan backend image
        run: trivy image --exit-code 0 --severity HIGH,CRITICAL alertpulse-backend:scan

      - name: Scan Python dependencies
        run: |
          pip install pip-audit
          cd backend && pip-audit -r requirements.txt || true

  # ── Stage 5: Deploy to Staging ────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/develop'
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          echo "Image: alertpulse-backend:${{ github.sha }}"
          docker compose -f docker-compose.yml up -d
          echo "Staging deployment complete"

  # ── Stage 6: Deploy to Production ────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: http://localhost:3000
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to production
        run: |
          echo "Deploying to production environment..."
          echo "Image: alertpulse-backend:${{ github.sha }}"
          docker compose up -d --build
          echo "Production deployment complete"
